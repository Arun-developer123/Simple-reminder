<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DGC Gurugram</title>
  <meta name="description" content="DGC Gurugram portal view." />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .loading.hidden {
      opacity: 0;
    }

    .loading-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #0f172a;
      font-weight: 600;
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 3px solid rgba(15, 23, 42, 0.12);
      border-top-color: #6f3df0;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="loading" class="loading">
      <div class="loading-card">
        <div class="spinner"></div>
        <div>Loading DGC Gurugram…</div>
      </div>
    </div>

    <iframe
      id="dgcFrame"
      src="http://dgcgurugram.ac.in"
      title="DGC Gurugram"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <script>
    const loading = document.getElementById('loading');
    const frame = document.getElementById('dgcFrame');

    frame.addEventListener('load', () => {
      loading.classList.add('hidden');
      setTimeout(() => {
        loading.style.display = 'none';
      }, 300);
    });

    // Safety timeout
    setTimeout(() => {
      loading.classList.add('hidden');
      setTimeout(() => {
        loading.style.display = 'none';
      }, 300);
    }, 7000);
  </script>

  <!-- DGC Assistant Widget -->

  <style>
    .gu-widget-label,
    [class*="label"] {
      display: none !important;
    }

    .gu-widget-button,
    [class*="button"] {
      all: unset !important;
    }

    .gu-widget-button img,
    [class*="button"] img {
      width: 60px !important;
      height: 60px !important;
      border-radius: 50% !important;
      object-fit: cover !important;
      cursor: pointer !important;
      display: block !important;
    }
  </style>

  <script src="https://gu-assistant.vercel.app/widget.js"
          data-src="https://gu-assistant.vercel.app"
          data-avatar="https://gu-assistant.vercel.app/avatar.gif"
          data-accent="#6f3df0"
          data-label=""
          async>
  </script>
</body>
</html>
